<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CV Extractor</title>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --text: #0f172a;
  --text-muted: #64748b;
  --primary: #0891b2;
  --primary-hover: #0e7490;
  --primary-subtle: #ecfeff;
  --accent: #059669;
  --error: #dc2626;
  --error-bg: #fef2f2;
  --error-border: #fecaca;
  --border: #e2e8f0;
  --border-hover: #94a3b8;
  --shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  --shadow-lg: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --primary: #22d3ee;
    --primary-hover: #67e8f9;
    --primary-subtle: #0f292e;
    --accent: #34d399;
    --error: #f87171;
    --error-bg: #451a1a;
    --error-border: #7f1d1d;
    --border: #334155;
    --border-hover: #64748b;
    --shadow: 0 1px 2px rgba(0,0,0,.2), 0 1px 3px rgba(0,0,0,.3);
    --shadow-lg: 0 4px 6px -1px rgba(0,0,0,.3), 0 2px 4px -2px rgba(0,0,0,.2);
  }
}
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 1rem;
  line-height: 1.6;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 1rem;
}
.container {
  background: var(--surface);
  padding: 2.5rem;
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  width: 100%;
  max-width: 480px;
}
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: .25rem;
  line-height: 1.3;
  letter-spacing: -.02em;
}
.subtitle {
  font-size: .9375rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  line-height: 1.5;
}
[role="alert"] {
  background: var(--error-bg);
  color: var(--error);
  border: 1px solid var(--error-border);
  border-radius: 10px;
  padding: .75rem 1rem;
  margin-bottom: 1rem;
  font-size: .875rem;
  line-height: 1.5;
  text-align: left;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 2rem 1rem;
  margin-bottom: 1.5rem;
  cursor: pointer;
  transition: border-color .2s, background .2s, box-shadow .2s;
}
.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--primary);
  background: var(--primary-subtle);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
}
.drop-zone:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}
.drop-zone input {
  display: none;
}
.drop-zone-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .75rem;
  cursor: pointer;
}
.drop-zone-icon {
  width: 48px;
  height: 48px;
  color: var(--text-muted);
  transition: color .2s;
}
.drop-zone:hover .drop-zone-icon {
  color: var(--primary);
}
.drop-zone-text {
  font-size: .9375rem;
  color: var(--text-muted);
  line-height: 1.5;
}
.drop-zone-hint {
  font-size: .8125rem;
  color: var(--text-muted);
  opacity: .6;
  line-height: 1.5;
}
#file-count {
  display: block;
  margin-top: .75rem;
  font-size: .8125rem;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.5;
}
.btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  width: 100%;
  padding: .8125rem 1.5rem;
  background: var(--primary);
  color: #ffffff;
  font-size: 1rem;
  font-weight: 600;
  font-family: inherit;
  line-height: 1.5;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s, box-shadow .15s, transform .15s;
}
.btn:hover {
  background: var(--primary-hover);
  box-shadow: var(--shadow);
}
.btn:active {
  transform: scale(.97);
}
.btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}
.btn:disabled {
  background: var(--border);
  color: var(--text-muted);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.spinner {
  display: inline-block;
  width: 1.125rem;
  height: 1.125rem;
  border: 2px solid #ffffff;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  flex-shrink: 0;
}
.btn:disabled .spinner {
  border-color: var(--text-muted);
  border-top-color: transparent;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>
</head>
<body>
<main class="container">
  <h1>CV Extractor</h1>
  <p class="subtitle">Upload PDF or DOCX files to extract contact info</p>

  <div id="error" role="alert" aria-live="assertive" hidden></div>

  <form method="post" enctype="multipart/form-data" action="{{ url_for('extract') }}" id="upload-form" novalidate>
    <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Click or drag to upload CV files">
      <label class="drop-zone-label" for="file-input">
        <svg class="drop-zone-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="drop-zone-text">Drop files here or click to browse</span>
        <span class="drop-zone-hint">Supports PDF and DOCX</span>
      </label>
      <input
        type="file"
        name="files"
        id="file-input"
        multiple
        accept=".pdf,.docx"
      >
      <span id="file-count"></span>
    </div>

    <button type="submit" class="btn" id="submit-btn">
      <span id="btn-text">Extract</span>
    </button>
  </form>
</main>

<script>
  const fileInput = document.getElementById('file-input');
  const fileCount = document.getElementById('file-count');
  const dropZone = document.getElementById('drop-zone');
  const form = document.getElementById('upload-form');
  const submitBtn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const errorEl = document.getElementById('error');

  function updateFileCount() {
    const n = fileInput.files.length;
    fileCount.textContent = n
      ? `${n} file${n !== 1 ? 's' : ''} selected`
      : '';
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
  }

  function clearError() {
    errorEl.hidden = true;
    errorEl.textContent = '';
  }

  fileInput.addEventListener('change', () => {
    clearError();
    updateFileCount();
  });

  dropZone.addEventListener('click', () => {
    fileInput.click();
  });

  dropZone.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', e => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('dragover');
    fileInput.files = e.dataTransfer.files;
    updateFileCount();
  });

  form.addEventListener('submit', e => {
    clearError();
    if (!fileInput.files.length) {
      e.preventDefault();
      showError('Please select at least one file.');
      return;
    }
    submitBtn.disabled = true;
    btnText.innerHTML = '<span class="spinner"></span>Extracting…';
  });
</script>
</body>
</html>
